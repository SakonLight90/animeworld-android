workflows:
  build-android:
    name: Build APK Firmato
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Debug e generazione keystore
        script: |
          echo "============================================"
          echo " PASSO 1: Scrittura password su file temporanei"
          echo "============================================"
          printf '%s' "AnimeWorld2026!" > /tmp/storepass.txt
          printf '%s' "AnimeWorld2026!" > /tmp/keypass.txt

          echo "Contenuto storepass.txt (esadecimale):"
          xxd /tmp/storepass.txt
          echo ""
          echo "Contenuto keypass.txt (esadecimale):"
          xxd /tmp/keypass.txt
          echo ""

          echo "============================================"
          echo " PASSO 2: Generazione keystore con keytool"
          echo "============================================"
          keytool -genkeypair \
            -keystore android/app/upload-keystore.jks \
            -storepass:file /tmp/storepass.txt \
            -keypass:file /tmp/keypass.txt \
            -alias animeworld \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=AnimeWorld, OU=App, O=AnimeWorld, L=Unknown, ST=Unknown, C=IT" \
            -J-Duser.language=en

          echo "keytool completato con successo."
          echo ""

          echo "============================================"
          echo " PASSO 3: Verifica esistenza keystore"
          echo "============================================"
          if [ -f android/app/upload-keystore.jks ]; then
            echo "Keystore creato: android/app/upload-keystore.jks"
            ls -la android/app/upload-keystore.jks
          else
            echo "ERRORE: Keystore non trovato!"
            exit 1
          fi

          echo "============================================"
          echo " PASSO 4: Pulizia file temporanei"
          echo "============================================"
          rm /tmp/storepass.txt /tmp/keypass.txt
          echo "File temporanei rimossi."
          echo ""

      - name: Installa dipendenze
        script: flutter pub get

      - name: Build APK release
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
